name: Packages Split
on:
  push:
    branches:
      - main
    tags:
      - '*' 
jobs:
  packages_split:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - local_path: 'Components/Http'
            repository: 'munastack-http'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MUNA }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git config --global url."git@github.com:".insteadOf "https://github.com/"

      - name: Split and Push
        uses: symplify/monorepo-split-github-action@main
        with:
          package_directory: ${{ matrix.package.local_path }}
          repository_organization: 'sinnerII'
          repository_name: ${{ matrix.package.repository }}
          branch: main
          user_name: "sinnerII"
          user_email: "bsdamulet@gmail.com"
